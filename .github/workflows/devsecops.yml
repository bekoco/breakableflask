name: Automatisation des tests DevSecOps
on: push

jobs:
  Dependances:
    runs-on: ubuntu-latest
    steps:
      # 1. On télécharge le code de votre repository sur le serveur GitHub
      - name: Checkout du code
        uses: actions/checkout@v3

      # 2. On lance l'analyse Trivy sur les fichiers texte (comme dans l'ex 2)
      - name: Contrôle des dépendances
        run: |
          docker run --rm -v "$PWD":/project aquasec/trivy:latest fs --file-patterns "pip:**/*.txt" /project

  Dockerfile:
    runs-on: ubuntu-latest
    needs: Dependances
    steps:
      # 1. On télécharge à nouveau le code pour ce job spécifique
      - name: Checkout du code
        uses: actions/checkout@v3

      # 2. On lance l'analyse Trivy ciblée sur les erreurs de configuration du Dockerfile
      - name: Contrôle du Dockerfile
        run: |
          docker run --rm -v "$PWD":/project aquasec/trivy:latest config /project/Dockerfile

  Deploy:
    runs-on: ubuntu-latest
    needs: Dockerfile
    steps:
      - name: Deploy
        run: |
          echo "Rien à faire ici. Votre application est prête à être déployée"
          
